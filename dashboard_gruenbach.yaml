  - type: sections
    max_columns: 2
    icon: mdi:lightning-bolt
    path: ''
    sections:
      - type: grid
        cards:
          - type: custom:power-flow-card-plus
            entities:
              battery:
                entity:
                  consumption: sensor.solarnet_entladeleistung
                  production: sensor.solarnet_ladeleistung
                state_of_charge: sensor.byd_battery_box_premium_hv_ladezustand
                invert_state: false
              grid:
                entity:
                  '0': s
                  '1': e
                  '2': 'n'
                  '3': s
                  '4': o
                  '5': r
                  '6': .
                  '7': s
                  '8': m
                  '9': a
                  '10': r
                  '11': t
                  '12': _
                  '13': m
                  '14': e
                  '15': t
                  '16': e
                  '17': r
                  '18': _
                  '19': t
                  '20': s
                  '21': _
                  '22': '6'
                  '23': '5'
                  '24': a
                  '25': _
                  '26': '3'
                  '27': _
                  '28': w
                  '29': i
                  '30': r
                  '31': k
                  '32': l
                  '33': e
                  '34': i
                  '35': s
                  '36': t
                  '37': u
                  '38': 'n'
                  '39': g
                  consumption: sensor.solarnet_leistung_netzbezug
                  production: sensor.solarnet_leistung_netzeinspeisung
                secondary_info: {}
              solar:
                entity: sensor.power_photovoltaics
                display_zero_state: true
                secondary_info: {}
                display_zero_tolerance: 5
              individual:
                - entity: sensor.ohmpilot_leistung
                  name: Heizstab
                  icon: mdi:water-boiler
                  color: '#ff6b35'
                  display_zero: false
            clickable_entities: true
            display_zero_lines:
              mode: show
              transparency: 50
              grey_color:
                - 189
                - 189
                - 189
            use_new_flow_rate_model: true
            w_decimals: 0
            kw_decimals: 1
            min_flow_rate: 0.75
            max_flow_rate: 6
            max_expected_power: 2000
            min_expected_power: 0.01
            watt_threshold: 1000
            transparency_zero_lines: 0
            title: PV
          - type: custom:mushroom-select-card
            entity: input_select.chartanzeige
            name: Zeitspanne
            secondary_info: none
            layout: horizontal
          - chart_type: bar
            period: day
            type: statistics-graph
            entities:
              - entity: sensor.photovoltaics_energy
                name: PV-Gesamt
              - entity: sensor.ohmpilot_verbrauchte_energie
                name: Heizstab
              - entity: sensor.wallbox_tagesenergie
                name: Autoladen
              - entity: sensor.smart_meter_ts_65a_3_eingespeiste_wirkenergie
                name: Einspeisung
              - entity: sensor.battery_energy_charged
                name: Batterieladung
              - entity: sensor.battery_energy_discharged
                name: Batterieentladung
              - entity: sensor.eigenverbrauch
                name: Eigenverbrauch
              - entity: sensor.smart_meter_ts_65a_3_bezogene_wirkenergie
                name: Netzbezug
            stat_types:
              - change
            hide_legend: false
            unit: kWh
            logarithmic_scale: false
            days_to_show: 7
            grid_options:
              columns: 12
              rows: 5
            visibility:
              - condition: state
                entity: input_select.chartanzeige
                state: Woche
          - chart_type: bar
            period: month
            type: statistics-graph
            entities:
              - entity: sensor.photovoltaics_energy
                name: PV-Gesamt
              - entity: sensor.ohmpilot_verbrauchte_energie
                name: Heizstab
              - entity: sensor.wallbox_tagesenergie
                name: Autoladen
              - entity: sensor.smart_meter_ts_65a_3_eingespeiste_wirkenergie
                name: Einspeisung
              - entity: sensor.battery_energy_charged
                name: Batterieladung
              - entity: sensor.battery_energy_discharged
                name: Batterieentladung
              - entity: sensor.eigenverbrauch
                name: Eigenverbrauch
              - entity: sensor.smart_meter_ts_65a_3_bezogene_wirkenergie
                name: Netzbezug
            stat_types:
              - change
            hide_legend: false
            unit: kWh
            logarithmic_scale: false
            days_to_show: 365
            grid_options:
              columns: 12
              rows: 5
            visibility:
              - condition: state
                entity: input_select.chartanzeige
                state: Monat
      - type: grid
        cards:
          - type: entities
            entities:
              - entity: >-
                  sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute
                name: Erzeugungsprognose
              - entity: sensor.eigenverbrauchsoptimierung_benotigte_energiemenge
                name: Noch benötigte Energie
              - entity: sensor.ohmpilot_temperatur
                name: 'Warmwasser '
              - entity: sensor.byd_battery_box_premium_hv_ladezustand
              - entity: sensor.ohmpilot_leistung
                name: Heizstableistung
              - entity: input_select.heizstab
              - entity: input_number.batterie_ladelimit_kw
              - entity: sensor.eigenverbrauch
            title: Eigenverbrauchsoptimierung
          - type: entities
            title: Prognose PV vs. Verbrauch
            entities:
              - type: custom:multiple-entity-row
                entity: sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute
                name: Heute (Rest)
                icon: mdi:white-balance-sunny
                format: precision2
                entities:
                  - entity: sensor.energieoptimierung_prognose_bis_sonnenuntergang
                    name: Verbrauch
                    format: precision2
              - type: custom:multiple-entity-row
                entity: sensor.solcast_pv_forecast_prognose_heute
                name: Heute Gesamt
                icon: mdi:white-balance-sunny
                format: precision2
                entities:
                  - entity: sensor.energieoptimierung_prognose_bis_sonnenuntergang
                    format: precision2
              - type: custom:multiple-entity-row
                entity: sensor.solcast_pv_forecast_prognose_morgen
                name: Morgen
                icon: mdi:weather-sunny
                format: precision2
                entities:
                  - entity: sensor.energieoptimierung_prognose_morgen
                    format: precision2
              - type: custom:multiple-entity-row
                entity: sensor.solcast_pv_forecast_prognose_tag_3
                name: Übermorgen
                icon: mdi:weather-sunny
                format: precision2
                entities:
                  - entity: sensor.energieoptimierung_prognose_tag_2
                    format: precision2
              - type: custom:multiple-entity-row
                entity: sensor.solcast_pv_forecast_prognose_tag_4
                name: Tag 4
                icon: mdi:weather-sunny
                format: precision2
                entities:
                  - entity: sensor.energieoptimierung_prognose_tag_3
                    format: precision2
              - type: custom:multiple-entity-row
                entity: sensor.solcast_pv_forecast_prognose_tag_5
                name: Tag 5
                icon: mdi:weather-sunny
                format: precision2
                entities:
                  - entity: sensor.energieoptimierung_prognose_tag_4
                    format: precision2
              - type: custom:multiple-entity-row
                entity: sensor.solcast_pv_forecast_prognose_tag_6
                name: Tag 6
                icon: mdi:weather-sunny
                format: precision2
                entities:
                  - entity: sensor.energieoptimierung_prognose_tag_5
                    format: precision2
              - type: custom:multiple-entity-row
                entity: sensor.solcast_pv_forecast_prognose_tag_7
                name: Tag 7
                icon: mdi:weather-sunny
                format: precision2
                entities:
                  - entity: sensor.energieoptimierung_prognose_tag_6
                    format: precision2
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              title: Ø Tagesverbrauch (ohne Heizstab & Wallbox)
              show: true
            graph_span: 18h
            span:
              start: day
              offset: +6h
            update_interval: 10min
            apex_config:
              chart:
                height: 300
                animations:
                  enabled: false
              legend:
                show: true
                position: top
              xaxis:
                labels:
                  format: HH:mm
              yaxis:
                - min: 0
                  title:
                    text: Watt
            all_series_config:
              stroke_width: 2.5
              curve: smooth
            series:
              - entity: sensor.energieoptimierung_verbrauchsprofil
                name: Mo-Do
                color: '#2196F3'
                data_generator: >
                  const w = entity.attributes['mo-do_watts'] || [];

                  const d = new Date(); d.setHours(0,0,0,0);

                  return w.slice(6).map((v,i) => [d.getTime()+(i+6)*3600000,
                  v]);
              - entity: sensor.energieoptimierung_verbrauchsprofil
                name: Freitag
                color: '#FF9800'
                data_generator: >
                  const w = entity.attributes['fr_watts'] || [];

                  const d = new Date(); d.setHours(0,0,0,0);

                  return w.slice(6).map((v,i) => [d.getTime()+(i+6)*3600000,
                  v]);
              - entity: sensor.energieoptimierung_verbrauchsprofil
                name: Samstag
                color: '#4CAF50'
                data_generator: >
                  const w = entity.attributes['sa_watts'] || [];

                  const d = new Date(); d.setHours(0,0,0,0);

                  return w.slice(6).map((v,i) => [d.getTime()+(i+6)*3600000,
                  v]);
              - entity: sensor.energieoptimierung_verbrauchsprofil
                name: Sonntag
                color: '#9C27B0'
                data_generator: >
                  const w = entity.attributes['so_watts'] || [];

                  const d = new Date(); d.setHours(0,0,0,0);

                  return w.slice(6).map((v,i) => [d.getTime()+(i+6)*3600000,
                  v]);
      - type: grid
        cards:
          - type: entities
            entities:
              - entity: sensor.hell_doberl_grunbach_spannung_dc
                name: Spannung String 1
                icon: mdi:lightning-bolt
              - entity: sensor.hell_doberl_grunbach_strom_dc

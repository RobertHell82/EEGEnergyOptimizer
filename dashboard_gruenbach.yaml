          - type: custom:mushroom-person-card
            entity: person.michael_doberl
            name: Michael
          - type: custom:mushroom-person-card
            entity: person.melanie_hell
            name: Melanie
          - type: custom:mushroom-person-card
            entity: person.roberthell

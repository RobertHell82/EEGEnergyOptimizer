                icon: mdi:lightning-bolt
              - entity: sensor.hell_doberl_grunbach_strom_dc_2
                name: Stromstärke String 2
                icon: mdi:lightning-bolt-outline
              - entity: sensor.byd_battery_box_premium_hv_temperatur
                name: Batterietemperatur
            title: Technische Daten
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Geschätzter Energiebedarf
          - type: vertical-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Energiebedarf heute
                secondary: '{{ states(''sensor.energieoptimierung_energiebedarf_heute'') }} kWh'
                icon: mdi:sigma
                icon_color: red
                card_mod:
                  style: |
                    ha-card { --ha-card-background: rgba(244,67,54,0.08); }
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    primary: Verbrauch bis SU
                    secondary: '{{ states(''sensor.prognose_bis_sonnenuntergang'') }} kWh'
                    icon: mdi:weather-sunset-down
                    icon_color: orange
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Batterie laden
                    secondary: '{{ states(''sensor.energieoptimierung_batterie_fehlende_energie'') }} kWh'
                    icon: mdi:battery-charging-outline
                    icon_color: green
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Puffer aufheizen
                    secondary: >-
                      {{ states('sensor.energieoptimierung_puffer_aufheizenergie') }} kWh ({{
                      state_attr('sensor.energieoptimierung_puffer_aufheizenergie',
                      'aktuelle_temperatur') }} → {{
                      state_attr('sensor.energieoptimierung_puffer_aufheizenergie',
                      'zieltemperatur') }})
                    icon: mdi:water-boiler
                    icon_color: deep-orange
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Tesla laden
                    secondary: >-
                      {% if states('sensor.energieoptimierung_tesla_fehlende_ladeenergie') | float
                      == 0 %}
                        Nicht in Grünbach
                      {% else %}
                        {{ states('sensor.energieoptimierung_tesla_fehlende_ladeenergie') }} kWh
                        ({{ state_attr('sensor.energieoptimierung_tesla_fehlende_ladeenergie', 'batteriestand') }}
                        → {{ state_attr('sensor.energieoptimierung_tesla_fehlende_ladeenergie', 'ladelimit') }})
                      {% endif %}
                    icon: mdi:car-electric
                    icon_color: >-
                      {% if states('sensor.energieoptimierung_tesla_fehlende_ladeenergie') | float
                      == 0 %}
                        grey
                      {% else %}
                        blue
                      {% endif %}
                    layout: vertical
    badges:

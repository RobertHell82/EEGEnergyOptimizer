            icon: mdi:weather-rainy
          - type: custom:mushroom-entity-card
            entity: sensor.homeatichd_svhmipsunshinecountertoday_3056
            fill_container: false
            icon: mdi:sun-clock
          - type: custom:mushroom-template-card

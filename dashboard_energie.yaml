title: Verbrauch
views:
  - title: Profil
    path: profil
    icon: mdi:chart-bell-curve-cumulative
    cards:

      - type: custom:mushroom-template-card
        primary: Ø Verbrauch ohne Heizstab & Wallbox
        secondary: "{{ states('sensor.energieoptimierung_verbrauchsprofil') }} kWh/Tag"
        icon: mdi:chart-bell-curve-cumulative
        icon_color: blue

      - type: grid
        columns: 4
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Mo-Do
            secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'mo-do_kwh') }} kWh"
            icon: mdi:briefcase
            icon_color: blue
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Freitag
            secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'fr_kwh') }} kWh"
            icon: mdi:glass-cocktail
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Samstag
            secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'sa_kwh') }} kWh"
            icon: mdi:party-popper
            icon_color: green
            layout: vertical
          - type: custom:mushroom-template-card
            primary: Sonntag
            secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'so_kwh') }} kWh"
            icon: mdi:sofa
            icon_color: purple
            layout: vertical

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Mo-Do
            secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'mo-do') }}"
            icon: mdi:briefcase
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: Freitag
            secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'fr') }}"
            icon: mdi:glass-cocktail
            icon_color: orange
          - type: custom:mushroom-template-card
            primary: Samstag
            secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'sa') }}"
            icon: mdi:party-popper
            icon_color: green
          - type: custom:mushroom-template-card
            primary: Sonntag
            secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'so') }}"
            icon: mdi:sofa
            icon_color: purple

      - type: custom:mushroom-template-card
        primary: Berechnungsgrundlage
        secondary: "{{ state_attr('sensor.energieoptimierung_verbrauchsprofil', 'grundlage') }}"
        icon: mdi:database
        icon_color: grey

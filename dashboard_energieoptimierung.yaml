title: Energieoptimierung
views:
  - title: Optimizer
    path: optimizer
    type: sections
    sections:
      # ── Zeile 1: Status & Strategie ────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: Optimizer Status
            entities:
              - entity: select.energieoptimierung_optimizer
                name: Ausführung
              - entity: sensor.energieoptimierung_entscheidung
                name: Strategie
            state_color: true

          - type: entity
            entity: sensor.energieoptimierung_entscheidung
            attribute: ueberschuss_faktor
            name: Überschuss-Faktor
            icon: mdi:scale-balance
            unit: x

          - type: entity
            entity: sensor.energieoptimierung_entscheidung
            attribute: strategie
            name: Tagesstrategie
            icon: mdi:strategy

      # ── Zeile 2: Begründung ────────────────────────────────────────
      - type: grid
        cards:
          - type: markdown
            title: Aktuelle Entscheidung
            content: |
              {% set txt = state_attr('sensor.energieoptimierung_entscheidung', 'begruendung') or '' %}
              {% set ts = state_attr('sensor.energieoptimierung_entscheidung', 'timestamp') or '' %}
              {% if txt %}
              {% for line in txt.split('\n') %}
              {% if line.startswith('Strategie:') %}**{{ line }}**
              {% elif line.startswith('Grund:') %}*{{ line }}*
              {% elif line.startswith('→') %}{{ line }}
              {% elif '⚠' in line or '✖' in line %}{{ line }}
              {% else %}{{ line }}
              {% endif %}
              {% endfor %}

              ---
              *Aktualisiert: {{ ts[:19] }}*
              {% else %}
              Noch keine Entscheidung berechnet.
              {% endif %}

      # ── Zeile 3: Optimizer Output (Stellwerte) ─────────────────────
      - type: grid
        cards:
          - type: entities
            title: "Stellwerte (Soll)"
            entities:
              - type: attribute
                entity: sensor.energieoptimierung_entscheidung
                attribute: heizstab_modus
                name: Heizstab
                icon: mdi:radiator
              - type: attribute
                entity: sensor.energieoptimierung_entscheidung
                attribute: ladelimit_kw
                name: Batterie Ladelimit
                icon: mdi:battery-charging
                suffix: kW
              - type: attribute
                entity: sensor.energieoptimierung_entscheidung
                attribute: einspeisung_aktiv
                name: Einspeisung
                icon: mdi:transmission-tower-export
              - type: attribute
                entity: sensor.energieoptimierung_entscheidung
                attribute: einspeisewert_kw
                name: Einspeisewert
                icon: mdi:flash
                suffix: kW
              - type: attribute
                entity: sensor.energieoptimierung_entscheidung
                attribute: entladung_aktiv
                name: Entladung
                icon: mdi:battery-arrow-down
              - type: attribute
                entity: sensor.energieoptimierung_entscheidung
                attribute: min_soc_berechnet
                name: Min-SOC (berechnet)
                icon: mdi:battery-low
                suffix: "%"

          - type: entities
            title: "Stellwerte (Ist)"
            entities:
              - entity: input_select.heizstab
                name: Heizstab
              - entity: input_number.batterie_ladelimit_kw
                name: Batterie Ladelimit
              - entity: input_boolean.fixe_einspeisung
                name: Einspeisung aktiv
              - entity: input_number.fixer_einspeisewert
                name: Einspeisewert

      # ── Zeile 4: PV & Netz (Inputs) ───────────────────────────────
      - type: grid
        cards:
          - type: gauge
            entity: sensor.solarnet_pv_leistung
            name: PV Leistung
            unit: W
            min: 0
            max: 15000
            needle: true
            severity:
              green: 6000
              yellow: 2000
              red: 0
            segments:
              - from: 0
                color: "#db4437"
              - from: 2000
                color: "#ffa600"
              - from: 6000
                color: "#43a047"

          - type: gauge
            entity: sensor.solarnet_leistung_netzeinspeisung
            name: Netzeinspeisung
            unit: W
            min: 0
            max: 5000
            needle: true
            segments:
              - from: 0
                color: "#78909c"
              - from: 3500
                color: "#ffa600"
              - from: 3950
                color: "#43a047"

          - type: gauge
            entity: sensor.solarnet_leistung_verbrauch
            name: Hausverbrauch
            unit: W
            min: 0
            max: 10000
            needle: true
            segments:
              - from: 0
                color: "#43a047"
              - from: 3000
                color: "#ffa600"
              - from: 6000
                color: "#db4437"

      # ── Zeile 5: Batterie & Warmwasser (Inputs) ────────────────────
      - type: grid
        cards:
          - type: gauge
            entity: sensor.byd_battery_box_premium_hv_ladezustand
            name: Batterie SOC
            unit: "%"
            min: 0
            max: 100
            needle: true
            segments:
              - from: 0
                color: "#db4437"
              - from: 10
                color: "#ffa600"
              - from: 25
                color: "#43a047"
              - from: 90
                color: "#1e88e5"

          - type: gauge
            entity: sensor.ohmpilot_temperatur
            name: Warmwasser
            unit: °C
            min: 20
            max: 95
            needle: true
            segments:
              - from: 20
                color: "#db4437"
              - from: 45
                color: "#ffa600"
              - from: 55
                color: "#43a047"
              - from: 80
                color: "#1e88e5"

          - type: gauge
            entity: sensor.ohmpilot_leistung
            name: Heizstab Leistung
            unit: W
            min: 0
            max: 7000
            needle: true
            segments:
              - from: 0
                color: "#78909c"
              - from: 100
                color: "#ffa600"
              - from: 4000
                color: "#e53935"

      # ── Zeile 6: Prognosen (Inputs) ────────────────────────────────
      - type: grid
        cards:
          - type: entities
            title: Prognosen & Bedarf
            entities:
              - entity: sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute
                name: PV Rest heute
                icon: mdi:solar-power-variant
              - entity: sensor.solcast_pv_forecast_prognose_morgen
                name: PV Prognose morgen
                icon: mdi:solar-power-variant-outline
              - entity: sensor.energieoptimierung_energiebedarf_heute
                name: Energiebedarf heute
                icon: mdi:sigma
              - entity: sensor.energieoptimierung_prognose_bis_sonnenaufgang
                name: Verbrauch bis Sonnenaufgang
                icon: mdi:weather-sunset-up
              - entity: sensor.energieoptimierung_prognose_bis_sonnenuntergang
                name: Verbrauch bis Sonnenuntergang
                icon: mdi:weather-sunset-down

          - type: entities
            title: Einzelbedarf
            entities:
              - entity: sensor.energieoptimierung_batterie_fehlende_energie
                name: Batterie → voll
                icon: mdi:battery-charging-outline
              - entity: sensor.energieoptimierung_puffer_aufheizenergie
                name: Puffer → Zieltemp
                icon: mdi:water-boiler
              - entity: sensor.energieoptimierung_tesla_fehlende_ladeenergie
                name: Tesla → Ladelimit
                icon: mdi:car-electric
              - entity: switch.holzvergaser_pumpe
                name: Holzvergaser
                icon: mdi:fireplace

      # ── Zeile 7: Soll/Ist Vergleich kompakt ────────────────────────
      - type: grid
        cards:
          - type: markdown
            title: Soll / Ist Vergleich
            content: >-
              | Parameter | Soll (Optimizer) | Ist (aktuell) |

              |:---|:---:|:---:|

              | **Heizstab** | {{
              state_attr('sensor.energieoptimierung_entscheidung',
              'heizstab_modus') or '–' }} | {{
              states('input_select.heizstab') }} |

              | **Ladelimit** | {{
              state_attr('sensor.energieoptimierung_entscheidung',
              'ladelimit_kw') or '–' }} kW | {{
              states('input_number.batterie_ladelimit_kw') }} kW |

              | **Einspeisung** | {{
              state_attr('sensor.energieoptimierung_entscheidung',
              'einspeisung_aktiv') or '–' }} | {{
              states('input_boolean.fixe_einspeisung') }} |

              | **Einspeisewert** | {{
              state_attr('sensor.energieoptimierung_entscheidung',
              'einspeisewert_kw') or '–' }} kW | {{
              states('input_number.fixer_einspeisewert') }} kW |
